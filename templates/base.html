<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rostiks — Учёт расходов{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #D0021B;
      --red-dark: #A80016;
      --red-lite: #FF1A35;
      --yellow:   #FFD000;
      --bg:       #F5F5F5;
      --white:    #FFFFFF;
      --text:     #1A1A1A;
      --muted:    #777777;
      --border:   #E0E0E0;
      --surface:  #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--red);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 28px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .logo-text {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      text-transform: uppercase;
    }
    .logo-text em {
      color: var(--yellow);
      font-style: normal;
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .nav-section {
      padding: 20px 14px;
      flex: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 8px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav-link:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .nav-link.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-weight: 600;
    }
    .nav-icon { font-size: 16px; width: 22px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
    }

    /* Main */
    .main { flex: 1; padding: 36px 40px; overflow-x: hidden; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .page-header h1 span { color: var(--red); }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--red);
    }
    .stat-card.yellow::before { background: var(--yellow); }
    .stat-card.green::before { background: #22c55e; }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }
    .card-value.red { color: var(--red); }

    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }

    /* Section title */
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      background: #FAFAFA;
    }
    td { padding: 13px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FFF8F8; }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #FEE2E2;
      color: var(--red-dark);
    }

    .amount {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-danger {
      background: #FEE2E2;
      color: var(--red);
      border: 1px solid #FECACA;
    }
    .btn-danger:hover { background: #FECACA; }
    .btn-ghost {
      background: var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: #d0d0d0; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--red); }
    textarea { resize: vertical; min-height: 80px; }

    /* Bar chart */
    .bar-item { margin-bottom: 14px; }
    .bar-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-weight: 500; }
    .bar-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--red), var(--red-lite)); transition: width 0.6s ease; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 500; }

    @media (max-width: 960px) {
      .sidebar { width: 220px; }
      .main { padding: 20px; }
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">Rostiks</div>
      <div class="logo-sub">Учёт расходов</div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Навигация</div>
      <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        <span class="nav-icon"></span> dashboard
      </a>
      <a href="{{ url_for('add') }}" class="nav-link {% if request.endpoint == 'add' %}active{% endif %}">
        <span class="nav-icon"></span> Новый расход
      </a>
      <a href="{{ url_for('expense_list') }}" class="nav-link {% if request.endpoint == 'expense_list' %}active{% endif %}">
        <span class="nav-icon"></span> Все расходы
      </a>
      <a href="{{ url_for('charts') }}" class="nav-link {% if request.endpoint == 'charts' %}active{% endif %}">
        <span class="nav-icon">📊</span> Графики
      </a>
    </nav>
    <div class="sidebar-footer">© 2026 Rostiks — внутренняя система</div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
